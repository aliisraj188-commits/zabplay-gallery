name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android @capacitor/cli @capacitor-community/media

      - name: Build Web Project
        # Yahan hum client build force kar rahe hain taaki folder ban jaye
        run: npm run build

      - name: Fix Directory Structure
        # Agar .output nahi mila, toh hum seedha build folder check karenge
        run: |
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          elif [ -d "dist" ]; then
            echo "Using existing dist folder"
          else
            echo "Manual build fix"
            npm run build
            cp -r .output/public/* dist/ || true
          fi

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Android already exists"
          npx cap sync android

      - name: Add Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />' android/app/src/main/AndroidManifest.xml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

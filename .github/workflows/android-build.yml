name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android @capacitor/cli @capacitor-community/media

      - name: Build Web Project
        run: npm run build

      - name: Create dist folder (TanStack Fix)
        # Ye step Capacitor ko wo folder dega jo use chahiye
        run: |
          mkdir -p dist
          cp -r .output/public/* dist/

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Android already exists"
          npx cap sync android

      - name: Add Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />' android/app/src/main/AndroidManifest.xml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

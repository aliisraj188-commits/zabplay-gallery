name: Build ZabPlay APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          rm -f bun.lockb package-lock.json
          npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Ensure dist/ contains build output
        run: |
          mkdir -p dist

          if [ -d "dist/client/assets" ]; then
            echo "✅ TanStack client build found at dist/client; flattening for Capacitor webDir=dist"
            cp -a dist/client/. dist/
          elif [ -f ".output/public/index.html" ]; then
            echo "📁 Copying .output/public -> dist/"
            cp -a .output/public/. dist/
          elif [ -f ".vinxi/build/client/index.html" ]; then
            echo "📁 Copying .vinxi/build/client -> dist/"
            cp -a .vinxi/build/client/. dist/
          elif [ -f "build/index.html" ]; then
            echo "📁 Copying build -> dist/"
            cp -a build/. dist/
          elif [ -f "out/index.html" ]; then
            echo "📁 Copying out -> dist/"
            cp -a out/. dist/
          elif [ -f "dist/index.html" ]; then
            echo "✅ dist/index.html already exists"
          else
            echo "⚠️ No known static output folder found; will try to create Capacitor index.html from dist/assets"
          fi

          if [ ! -f "dist/index.html" ]; then
            node --input-type=module <<'NODE'
          import { existsSync, readdirSync, readFileSync, statSync, writeFileSync } from 'node:fs'
          import { join, relative } from 'node:path'

          const distDir = 'dist'
          if (!existsSync(distDir)) {
            console.error('❌ dist folder missing after web build')
            process.exit(1)
          }

          const walk = (dir) => readdirSync(dir).flatMap((name) => {
            const path = join(dir, name)
            return statSync(path).isDirectory() ? walk(path) : [path]
          })

          const toHref = (file) => `./${relative(distDir, file).replaceAll('\\', '/')}`
          const files = walk(distDir)
          const jsFiles = files.filter((file) => file.endsWith('.js'))
          const entryFile = jsFiles.find((file) => {
            const code = readFileSync(file, 'utf8')
            return code.includes('hydrateRoot(document') || code.includes('createRoot(document')
          }) ?? jsFiles.find((file) => readFileSync(file, 'utf8').includes('@tanstack/react-start')) ?? jsFiles[0]

          if (!entryFile) {
            console.error('❌ Could not find browser entry JavaScript in dist')
            process.exit(1)
          }

          const cssLinks = files
            .filter((file) => file.endsWith('.css'))
            .map((file) => `    <link rel="stylesheet" href="${toHref(file)}">`)
            .join('\n')

          writeFileSync('dist/index.html', `<!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
              <title>ZabPlay</title>
          ${cssLinks}
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="${toHref(entryFile)}"></script>
            </body>
          </html>
          `)

          console.log(`✅ Created dist/index.html using ${toHref(entryFile)}`)
          NODE
          fi

          # Make asset paths relative for Capacitor WebView
          sed -i 's|href="/|href="./|g' dist/index.html
          sed -i 's|src="/|src="./|g' dist/index.html

          if ! grep -q '<div id="root"' dist/index.html; then
            sed -i 's|<body>|<body><div id="root"></div>|' dist/index.html
          fi

          test -f dist/index.html
          grep -q '<script type="module"' dist/index.html
          grep -q '<div id="root"' dist/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync Android
        run: |
          npx cap add android 2>/dev/null || echo "Android platform already exists"
          npx cap sync android

      - name: Build APK (assembleDebug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build AAB (bundleDebug)
        run: |
          cd android
          ./gradlew bundleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-AAB-${{ github.run_number }}
          path: android/app/build/outputs/bundle/debug/app-debug.aab

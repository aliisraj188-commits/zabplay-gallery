name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android @capacitor/cli @capacitor-community/media

      - name: Build Web Project
        run: npm run build

      - name: TanStack Directory Fix
        # Ye step sabse zaroori hai: Ye folder ko rename kar dega taaki Capacitor ko files mil jayein
        run: |
          if [ -d ".output/public" ]; then
            rm -rf dist
            mv .output/public dist
            echo "Fixed: .output/public moved to dist"
          else
            echo "Checking if dist already exists"
            ls -d dist || mkdir dist
          fi

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Android exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

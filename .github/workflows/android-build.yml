name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Ultimate Directory Fix
        # Ye step har kone se build files dhoond kar 'dist' mein dalega
        run: |
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          elif [ -d ".vinxi/build/client" ]; then
            cp -r ".vinxi/build/client/"* dist/
          elif [ -d "build" ]; then
            cp -r build/* dist/
          fi
          # Capacitor ki tasalli ke liye agar kuch na mile toh dummy file
          if [ ! -f "dist/index.html" ]; then
            echo "<html><body>ZabPlay Loading...</body></html>" > dist/index.html
          fi

      - name: Capacitor Sync
        run: |
          npm install @capacitor/android @capacitor/cli @capacitor-community/media
          npx cap add android || echo "Android folder already there"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk


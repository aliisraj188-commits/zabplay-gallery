name: Build ZabPlay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ==================== STEP 1: Checkout ====================
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==================== STEP 2: Setup Bun ====================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ==================== STEP 3: Install Dependencies ====================
      - name: Install Dependencies
        run: |
          echo "📦 Installing with Bun..."
          bun install --frozen-lockfile || bun install
          
          # Capacitor packages ensure karo
          bun add @capacitor/android @capacitor/cli @capacitor/core

      # ==================== STEP 4: Build Project ====================
      - name: Build Project
        run: |
          echo "🔨 Building with Bun..."
          bun run build

      # ==================== STEP 5: Auto Detect & Copy Build Output ====================
      - name: Auto Detect Build Output
        run: |
          echo "🔍 Searching for build output folders..."
          
          # TanStack Start / Vinxi ke liye common folders
          folders=(
            ".output/public"
            "dist"
            ".vinxi/build/client"
            "build"
            "out"
            "public"
          )
          
          SOURCE_DIR=""
          FOUND=false
          
          for folder in "${folders[@]}"; do
            if [ -d "$folder" ] && [ "$(ls -A $folder 2>/dev/null)" ]; then
              echo "✅ Found build output: $folder"
              SOURCE_DIR="$folder"
              FOUND=true
              break
            fi
          done
          
          if [ "$FOUND" = false ]; then
            echo "❌ ERROR: No build output folder found!"
            echo "📂 Current directory contents:"
            ls -la
            echo "🔍 Searching all folders..."
            find . -maxdepth 2 -type d | head -20
            exit 1
          fi
          
          # Capacitor ke liye dist folder banao
          mkdir -p dist
          
          # Files copy karo
          echo "📁 Copying from $SOURCE_DIR to dist/"
          cp -r "$SOURCE_DIR"/* dist/
          
          # Verify
          echo "📂 Dist folder contents:"
          ls -la dist/
          echo "📄 Files count: $(find dist -type f | wc -l)"

      # ==================== STEP 6: Fix Paths for Mobile ====================
      - name: Fix Paths for Mobile
        run: |
          if [ -f "dist/index.html" ]; then
            echo "🔧 Fixing absolute paths to relative paths..."
            sed -i 's|href="/|href="./|g' dist/index.html
            sed -i 's|src="/|src="./|g' dist/index.html
            sed -i 's|url(/|url(./|g' dist/index.html
            echo "✅ Paths fixed in index.html"
            
            # CSS files mein bhi fix karo
            find dist -name "*.css" -exec sed -i 's|url(/|url(./|g' {} \; 2>/dev/null || true
          else
            echo "⚠️ No index.html found in dist"
          fi

      # ==================== STEP 7: Capacitor Sync ====================
      - name: Capacitor Sync
        run: |
          # capacitor.config.ts se webDir check karo
          echo "📋 Capacitor config:"
          cat capacitor.config.ts 2>/dev/null || cat capacitor.config.json 2>/dev/null || echo "No config found"
          
          # Android platform add karo
          bunx cap add android || echo "⚠️ Android already exists or error"
          
          # Sync karo
          bunx cap sync android

      # ==================== STEP 8: Setup Java ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ==================== STEP 9: Setup Android SDK ====================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ==================== STEP 10: Build APK ====================
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ==================== STEP 11: Upload APK ====================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      # ==================== STEP 12: Success Message ====================
      - name: Build Success
        if: success()
        run: echo "🎉 APK Build Successful! Download from Artifacts."

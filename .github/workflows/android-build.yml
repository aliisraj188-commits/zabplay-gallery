name: Build ZabPlay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ==================== STEP 1: Checkout ====================
      - name: Checkout Code
        uses: actions/checkout@v4

      # ==================== STEP 2: Setup Bun ====================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ==================== STEP 3: Fix Package.json Version Error ====================
      - name: Fix TanStack Version Error
        run: |
          echo "🔧 Fixing @tanstack/router-vite-plugin version..."
          
          # package.json mein se exact version hatao aur latest lagao
          # Ya phir poora tanstack section update karo
          
          # Method 1: package.json mein version fix karo
          if grep -q "@tanstack/router-vite-plugin" package.json; then
            echo "📦 Found router-vite-plugin in package.json"
            
            # Version ^1.167.10 ko latest mein convert karo
            sed -i 's/"@tanstack\/router-vite-plugin": "\^1.167.10"/"@tanstack\/router-vite-plugin": "latest"/g' package.json
            sed -i 's/"@tanstack\/router-vite-plugin": "\^1.167.10"/"@tanstack\/router-vite-plugin": "latest"/g' package.json
            
            # Agar koi aur format ho toh bhi catch karo
            sed -i 's/"@tanstack\/router-vite-plugin": ".*"/"@tanstack\/router-vite-plugin": "latest"/g' package.json
            
            echo "✅ Version fixed to 'latest'"
            cat package.json | grep -A1 -B1 "router-vite-plugin" || true
          fi
          
          # Lock files delete karo taaki fresh install ho
          echo "🗑️ Removing lock files..."
          rm -f bun.lockb
          rm -f package-lock.json
          rm -rf node_modules

      # ==================== STEP 4: Install Dependencies ====================
      - name: Install Dependencies
        run: |
          echo "📦 Installing with Bun..."
          
          # Fresh install without lock file
          bun install || {
            echo "⚠️ First attempt failed, trying with --no-save..."
            bun install --no-save || {
              echo "⚠️ Trying npm fallback..."
              npm install --legacy-peer-deps
            }
          }
          
          # Capacitor packages install karo
          bun add @capacitor/android @capacitor/cli @capacitor/core || \
          npm install @capacitor/android @capacitor/cli @capacitor/core --legacy-peer-deps

      # ==================== STEP 5: Build Project ====================
      - name: Build Project
        run: |
          echo "🔨 Building..."
          bun run build || npm run build

      # ==================== STEP 6: Auto Detect Build Output ====================
      - name: Auto Detect Build Output
        run: |
          echo "🔍 Searching for build output..."
          
          folders=(".output/public" "dist" ".vinxi/build/client" "build" "out")
          SOURCE_DIR=""
          FOUND=false
          
          for folder in "${folders[@]}"; do
            if [ -d "$folder" ] && [ "$(ls -A $folder 2>/dev/null)" ]; then
              echo "✅ Found: $folder"
              SOURCE_DIR="$folder"
              FOUND=true
              break
            fi
          done
          
          if [ "$FOUND" = false ]; then
            echo "❌ No build output found!"
            ls -la
            find . -maxdepth 3 -type d | head -30
            exit 1
          fi
          
          mkdir -p dist
          cp -r "$SOURCE_DIR"/* dist/
          echo "📁 Copied $(find dist -type f | wc -l) files to dist/"

      # ==================== STEP 7: Fix Paths ====================
      - name: Fix Paths for Mobile
        run: |
          if [ -f "dist/index.html" ]; then
            sed -i 's|href="/|href="./|g' dist/index.html
            sed -i 's|src="/|src="./|g' dist/index.html
            echo "✅ Paths fixed"
          fi

      # ==================== STEP 8: Capacitor Sync ====================
      - name: Capacitor Sync
        run: |
          bunx cap add android 2>/dev/null || echo "Android exists"
          bunx cap sync android || npx cap sync android

      # ==================== STEP 9: Setup Java ====================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ==================== STEP 10: Build APK ====================
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ==================== STEP 11: Upload APK ====================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
      

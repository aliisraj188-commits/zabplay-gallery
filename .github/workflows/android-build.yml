name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Repair Dependencies
        # Maine 'legacy-peer-deps' dala hai taaki version ka koi error na aaye
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android @capacitor/cli @capacitor/core --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Automatic Path & Design Fixer
        # Ye step khud dhoondhega ki build kahan hai aur use 'dist' mein daal dega
        run: |
          mkdir -p dist
          # Build files scan karna
          if [ -d ".output/public" ]; then cp -r .output/public/* dist/; 
          elif [ -d ".vinxi/build/client" ]; then cp -r .vinxi/build/client/* dist/;
          elif [ -d "build" ]; then cp -r build/* dist/; 
          elif [ -d "out" ]; then cp -r out/* dist/; fi
          
          # Design Fix: Mobile ke liye raste (paths) sahi karna
          if [ -f "dist/index.html" ]; then
            sed -i 's/href="\//href=".//g' dist/index.html
            sed -i 's/src="\//src=".//g' dist/index.html
          fi

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Android folder exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Final-Auto-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

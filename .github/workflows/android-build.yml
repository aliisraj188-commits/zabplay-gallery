name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Fix Dependencies
        run: |
          npm install
          # Missing plugins ko auto-install karna
          npm install @tanstack/router-plugin @capacitor/android @capacitor/cli @capacitor/core

      - name: Build Project
        run: npm run build

      - name: Auto-Fix Design & Paths
        # Ye step bina aapke kahe sab kuch sahi jagah set kar dega
        run: |
          mkdir -p dist
          # 1. Build folder dhoondna
          if [ -d ".output/public" ]; then cp -r .output/public/* dist/; 
          elif [ -d ".vinxi/build/client" ]; then cp -r .vinxi/build/client/* dist/;
          elif [ -d "build" ]; then cp -r build/* dist/; fi
          
          # 2. Design/CSS paths fix karna (Jo blank screen ki wajah hai)
          if [ -f "dist/index.html" ]; then
            sed -i 's/href="\//href=".//g' dist/index.html
            sed -i 's/src="\//src=".//g' dist/index.html
          fi

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Folder exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Final-Fixed-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

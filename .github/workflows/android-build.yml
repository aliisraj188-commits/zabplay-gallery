name: Build ZabPlay APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          rm -f bun.lockb package-lock.json
          npm install --legacy-peer-deps
          npm install --legacy-peer-deps \
            @capacitor/core@^6.0.0 \
            @capacitor/android@^6.0.0 \
            @capacitor/cli@^6.0.0

      - name: Build Web Project
        run: npm run build

      - name: Ensure dist/ contains build output
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist 2>/dev/null)" ]; then
            echo "✅ dist/ already populated"
          else
            mkdir -p dist
            for src in ".output/public" ".vinxi/build/client" "build" "out"; do
              if [ -d "$src" ] && [ "$(ls -A $src 2>/dev/null)" ]; then
                echo "📁 Copying $src -> dist/"
                cp -r "$src"/* dist/
                break
              fi
            done
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "❌ dist/index.html missing"
            ls -la dist || true
            exit 1
          fi

          # Make asset paths relative for Capacitor WebView
          sed -i 's|href="/|href="./|g' dist/index.html
          sed -i 's|src="/|src="./|g' dist/index.html

      - name: Capacitor Sync Android
        run: |
          npx cap add android 2>/dev/null || echo "Android platform already exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (assembleDebug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build AAB (bundleDebug)
        run: |
          cd android
          ./gradlew bundleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-AAB-${{ github.run_number }}
          path: android/app/build/outputs/bundle/debug/app-debug.aab

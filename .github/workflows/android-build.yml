name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @tanstack/router-plugin @capacitor/android @capacitor/cli

      - name: Build Project
        run: npm run build

      - name: Ultimate Directory Fix
        run: |
          mkdir -p dist
          # Build files ko sahi jagah move karna
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          elif [ -d ".vinxi/build/client" ]; then
            cp -r .vinxi/build/client/* dist/
          elif [ -d "build" ]; then
            cp -r build/* dist/
          fi
          
          # DESIGN FIX: index.html ke andar ke paths ko mobile-friendly banana
          if [ -f "dist/index.html" ]; then
            sed -i 's/href="\//href=".//g' dist/index.html
            sed -i 's/src="\//src=".//g' dist/index.html
            echo "Design paths fixed for mobile"
          fi

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Android folder exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

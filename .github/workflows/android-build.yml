name: Build ZabPlay APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Move Build Files
        # TanStack ki files ko 'dist' folder mein set karna taaki Capacitor error na de
        run: |
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          elif [ -d ".vinxi/build/client" ]; then
            cp -r .vinxi/build/client/* dist/
          fi

      - name: Capacitor Sync
        run: |
          npm install @capacitor/android @capacitor/cli @capacitor-community/media
          npx cap add android || echo "Android exists"
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

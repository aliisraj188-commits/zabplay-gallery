name: Build ZabPlay APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          rm -f bun.lockb package-lock.json
          npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Ensure dist/ contains build output
        run: |
          mkdir -p dist

          if [ -f "dist/client/index.html" ]; then
            echo "✅ TanStack build found at dist/client; flattening for Capacitor webDir=dist"
            cp -a dist/client/. dist/
          elif [ -f ".output/public/index.html" ]; then
            echo "📁 Copying .output/public -> dist/"
            cp -a .output/public/. dist/
          elif [ -f ".vinxi/build/client/index.html" ]; then
            echo "📁 Copying .vinxi/build/client -> dist/"
            cp -a .vinxi/build/client/. dist/
          elif [ -f "build/index.html" ]; then
            echo "📁 Copying build -> dist/"
            cp -a build/. dist/
          elif [ -f "out/index.html" ]; then
            echo "📁 Copying out -> dist/"
            cp -a out/. dist/
          elif [ -f "dist/index.html" ]; then
            echo "✅ dist/index.html already exists"
          else
            echo "❌ Could not find web index.html for Capacitor"
            echo "Project root:"
            ls -la
            echo "dist:"
            ls -la dist || true
            exit 1
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "❌ dist/index.html missing"
            ls -la dist || true
            exit 1
          fi

          # Make asset paths relative for Capacitor WebView
          sed -i 's|href="/|href="./|g' dist/index.html
          sed -i 's|src="/|src="./|g' dist/index.html

      - name: Capacitor Sync Android
        run: |
          npx cap add android 2>/dev/null || echo "Android platform already exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK (assembleDebug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build AAB (bundleDebug)
        run: |
          cd android
          ./gradlew bundleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ZabPlay-AAB-${{ github.run_number }}
          path: android/app/build/outputs/bundle/debug/app-debug.aab
